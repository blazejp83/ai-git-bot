<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout :: layout(${integration.id != null ? 'Edit AI Integration' : 'New AI Integration'}, ~{::pageContent})}">
    <div th:fragment="pageContent">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-stars"></i>
                <span th:if="${integration.id != null}">Edit AI Integration</span>
                <span th:if="${integration.id == null}">New AI Integration</span>
            </h2>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/ai-integrations/save}" method="post" th:object="${integration}">
                    <input type="hidden" th:if="${integration.id != null}" th:field="*{id}"/>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   placeholder="e.g. My OpenAI Integration" required/>
                        </div>
                        <div class="col-md-6">
                            <label for="providerType" class="form-label">Provider Type</label>
                            <select class="form-select" id="providerType" th:field="*{providerType}" required>
                                <option value="">Select a provider...</option>
                                <option th:each="type : ${providerTypes}"
                                        th:value="${type}" th:text="${type}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="apiUrl" class="form-label">API URL</label>
                            <input type="url" class="form-control" id="apiUrl" th:field="*{apiUrl}"
                                   placeholder="e.g. https://api.openai.com/v1" required/>
                        </div>
                        <div class="col-md-6">
                            <label for="apiKey" class="form-label">API Key</label>
                            <input type="password" class="form-control" id="apiKey" name="apiKey"
                                   placeholder="Enter API key"/>
                            <div th:if="${integration.id != null}" class="form-text">
                                Leave blank to keep current API key.
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="apiVersion" class="form-label">API Version</label>
                            <input type="text" class="form-control" id="apiVersion" th:field="*{apiVersion}"
                                   placeholder="e.g. 2024-02-15-preview (optional)"/>
                        </div>
                        <div class="col-md-6">
                            <label for="model" class="form-label">Model</label>
                            <input type="text" class="form-control" id="model" th:field="*{model}"
                                   placeholder="e.g. gpt-4o, claude-3-opus" required/>
                        </div>

                        <div class="col-md-3">
                            <label for="maxTokens" class="form-label">Max Tokens</label>
                            <input type="number" class="form-control" id="maxTokens" th:field="*{maxTokens}"
                                   min="1" required/>
                        </div>
                        <div class="col-md-3">
                            <label for="maxDiffCharsPerChunk" class="form-label">Max Diff Chars/Chunk</label>
                            <input type="number" class="form-control" id="maxDiffCharsPerChunk"
                                   th:field="*{maxDiffCharsPerChunk}" min="1" required/>
                        </div>
                        <div class="col-md-3">
                            <label for="maxDiffChunks" class="form-label">Max Diff Chunks</label>
                            <input type="number" class="form-control" id="maxDiffChunks"
                                   th:field="*{maxDiffChunks}" min="1" required/>
                        </div>
                        <div class="col-md-3">
                            <label for="retryTruncatedChunkChars" class="form-label">Retry Truncated Chars</label>
                            <input type="number" class="form-control" id="retryTruncatedChunkChars"
                                   th:field="*{retryTruncatedChunkChars}" min="1" required/>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Save
                        </button>
                        <a th:href="@{/ai-integrations}" class="btn btn-secondary ms-2">
                            <i class="bi bi-x-lg"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
