<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout :: layout(${integration.id != null ? 'Edit Git Integration' : 'New Git Integration'}, ~{::pageContent})}">
    <div th:fragment="pageContent">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-git"></i>
                <span th:if="${integration.id != null}">Edit Git Integration</span>
                <span th:if="${integration.id == null}">New Git Integration</span>
            </h2>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/git-integrations/save}" method="post" th:object="${integration}">
                    <input type="hidden" th:if="${integration.id != null}" th:field="*{id}"/>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   placeholder="e.g. My Gitea Server" required/>
                        </div>
                        <div class="col-md-6">
                            <label for="providerType" class="form-label">Provider Type</label>
                            <select class="form-select" id="providerType" th:field="*{providerType}" required>
                                <option value="">Select a provider...</option>
                                <option th:each="type : ${providerTypes}"
                                        th:value="${type}" th:text="${type}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="url" class="form-label">URL</label>
                            <input type="url" class="form-control" id="url" th:field="*{url}"
                                   placeholder="e.g. https://gitea.example.com" required/>
                        </div>
                        <div class="col-md-6">
                            <label for="token" class="form-label">Token</label>
                            <input type="password" class="form-control" id="token" name="token"
                                   placeholder="Enter access token"/>
                            <div th:if="${integration.id != null}" class="form-text">
                                Leave blank to keep current token.
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Save
                        </button>
                        <a th:href="@{/git-integrations}" class="btn btn-secondary ms-2">
                            <i class="bi bi-x-lg"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
