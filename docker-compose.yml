services:
  ai-git-bot:
    image: registry.bpds1621.synology.me/ai-git-bot:2.0.0
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "sqlite://data/aigitbot.db"
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - ./data:/data
    restart: unless-stopped
