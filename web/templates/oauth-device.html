<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login with OpenAI - AI Git Bot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg"/>
</head>
<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-check fs-1 text-success"></i>
                        <h3 class="mt-2">Login with OpenAI</h3>
                        <p class="text-muted">Connecting integration: <strong>{{.IntegrationName}}</strong></p>
                    </div>

                    <div id="pending" class="text-center">
                        <div class="alert alert-info">
                            <h5>Step 1: Open the verification page</h5>
                            <p>
                                <a href="{{.VerificationURL}}" target="_blank" class="btn btn-primary btn-lg mt-2">
                                    <i class="bi bi-box-arrow-up-right"></i> Open OpenAI Login
                                </a>
                            </p>
                        </div>

                        <div class="alert alert-warning mt-3">
                            <h5>Step 2: Enter this code</h5>
                            <div class="display-4 font-monospace fw-bold user-select-all my-3" id="userCode">{{.UserCode}}</div>
                            <button class="btn btn-sm btn-outline-secondary" onclick="navigator.clipboard.writeText('{{.UserCode}}')">
                                <i class="bi bi-clipboard"></i> Copy code
                            </button>
                        </div>

                        <div class="mt-4">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            <span class="text-muted ms-2" id="statusText">Waiting for authorization...</span>
                        </div>
                    </div>

                    <div id="success" class="text-center" style="display:none;">
                        <div class="alert alert-success">
                            <i class="bi bi-check-circle fs-3"></i>
                            <h5 class="mt-2">Connected!</h5>
                            <p id="successEmail"></p>
                        </div>
                        <a href="/ai-integrations/{{.IntegrationID}}/edit" class="btn btn-primary">
                            <i class="bi bi-arrow-left"></i> Back to Integration
                        </a>
                    </div>

                    <div id="error" class="text-center" style="display:none;">
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle fs-3"></i>
                            <h5 class="mt-2">Authorization failed</h5>
                            <p id="errorText"></p>
                        </div>
                        <a href="/ai-integrations/{{.IntegrationID}}/oauth" class="btn btn-primary me-2">
                            <i class="bi bi-arrow-clockwise"></i> Try again
                        </a>
                        <a href="/ai-integrations/{{.IntegrationID}}/edit" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Back
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var pollInterval = setInterval(function() {
            fetch('/ai-integrations/{{.IntegrationID}}/oauth/poll')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.status === 'success') {
                        clearInterval(pollInterval);
                        document.getElementById('pending').style.display = 'none';
                        document.getElementById('success').style.display = 'block';
                        if (data.email) {
                            document.getElementById('successEmail').textContent = 'Logged in as ' + data.email;
                        }
                    } else if (data.status === 'error') {
                        clearInterval(pollInterval);
                        document.getElementById('pending').style.display = 'none';
                        document.getElementById('error').style.display = 'block';
                        document.getElementById('errorText').textContent = data.error || 'Unknown error';
                    }
                    // 'pending' — keep polling
                })
                .catch(function() {
                    // Network error — keep polling
                });
        }, 3000);

        // Stop polling after 15 minutes
        setTimeout(function() {
            clearInterval(pollInterval);
            document.getElementById('statusText').textContent = 'Timed out. Please try again.';
        }, 15 * 60 * 1000);
    })();
    </script>
</body>
</html>
