{{define "title"}}{{if .IsEdit}}Edit{{else}}New{{end}} Bot - AI Git Bot{{end}}

{{define "content"}}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-cpu"></i> {{if .IsEdit}}Edit Bot{{else}}New Bot{{end}}</h2>
</div>

{{if and .IsEdit .Bot.WebhookPath}}
<div class="alert alert-info">
    <i class="bi bi-link-45deg"></i> <strong>Webhook URL:</strong> <code>{{.Bot.WebhookPath}}</code>
</div>
{{end}}

<div class="card">
    <div class="card-body">
        <form action="/bots/save" method="post">
            {{if .IsEdit}}<input type="hidden" name="id" value="{{.Bot.ID}}"/>
            <input type="hidden" name="webhookSecret" value="{{.Bot.WebhookSecret}}"/>{{end}}
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{.Bot.Name}}" placeholder="e.g. Code Review Bot" required/>
                </div>
                <div class="col-md-6">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" value="{{.Bot.Username}}" placeholder="Bot username on Git platform" required/>
                </div>
                <div class="col-12">
                    <label for="prompt" class="form-label">System Prompt</label>
                    <textarea class="form-control" id="prompt" name="prompt" rows="6" placeholder="System prompt for the AI bot...">{{.Bot.Prompt}}</textarea>
                </div>
                <div class="col-md-6">
                    <label for="aiIntegrationId" class="form-label">AI Integration</label>
                    <select class="form-select" id="aiIntegrationId" name="aiIntegrationId" required>
                        <option value="">Select...</option>
                        {{range .AiIntegrations}}
                        <option value="{{.ID}}"{{if eq .ID $.Bot.AiIntegrationID}} selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="gitIntegrationId" class="form-label">Git Integration</label>
                    <select class="form-select" id="gitIntegrationId" name="gitIntegrationId" required>
                        <option value="">Select...</option>
                        {{range .GitIntegrations}}
                        <option value="{{.ID}}"{{if eq .ID $.Bot.GitIntegrationID}} selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                <div class="col-md-6">
                    <div class="form-check form-switch mt-3">
                        <input class="form-check-input" type="checkbox" id="enabled" name="enabled" value="true"{{if .Bot.Enabled}} checked{{end}}/>
                        <label class="form-check-label" for="enabled">Enabled</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-check form-switch mt-3">
                        <input class="form-check-input" type="checkbox" id="agentEnabled" name="agentEnabled" value="true"{{if .Bot.AgentEnabled}} checked{{end}}/>
                        <label class="form-check-label" for="agentEnabled">Agent Enabled</label>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
                <a href="/bots" class="btn btn-secondary ms-2"><i class="bi bi-x-lg"></i> Cancel</a>
            </div>
        </form>
    </div>
</div>
{{end}}
